name: Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Install frontend dependencies
        shell: pwsh
        run: npm ci

      - name: Derive release version
        id: version
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if (-not $tag.StartsWith('v')) {
            throw "Expected tag ref like v1.2.3, got: $tag"
          }
          $version = $tag.Substring(1)
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Run release checks
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\check.ps1 -Scope release

      - name: Build release artifacts
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-release.ps1 -Version ${{ steps.version.outputs.version }} -AllowDirty

      - name: Validate release notes
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\assert-release-notes.ps1 -Path release/v${{ steps.version.outputs.version }}/release-notes-v${{ steps.version.outputs.version }}.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release/v${{ steps.version.outputs.version }}/release-notes-v${{ steps.version.outputs.version }}.md
          files: |
            release/v${{ steps.version.outputs.version }}/acliv-v${{ steps.version.outputs.version }}.exe
            release/v${{ steps.version.outputs.version }}/acliv-v${{ steps.version.outputs.version }}-x64-setup.exe
            release/v${{ steps.version.outputs.version }}/acliv-v${{ steps.version.outputs.version }}-x64-en-us.msi

  macos-release:
    name: macos-release (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Derive release version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" != v* ]]; then
            echo "Expected tag ref like v1.2.3, got: $tag" >&2
            exit 1
          fi
          version="${tag#v}"
          {
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Run release checks
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/check.ps1 -Scope release

      - name: Build macOS bundle
        run: npm run tauri build -- --bundles app,dmg

      - name: Collect macOS artifacts
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          release_dir="release/v${version}"
          mkdir -p "$release_dir"

          dmg_path="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f | head -n 1)"

          if [[ -z "$dmg_path" ]]; then
            echo "Missing macOS .dmg installer" >&2
            exit 1
          fi

          cp "$dmg_path" "$release_dir/acliv-v${version}-macos-${{ matrix.arch }}.dmg"

      - name: Publish macOS assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            release/v${{ steps.version.outputs.version }}/acliv-v${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.dmg
