name: Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Install frontend dependencies
        shell: pwsh
        run: npm ci

      - name: Derive release version
        id: version
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if (-not $tag.StartsWith('v')) {
            throw "Expected tag ref like v1.2.3, got: $tag"
          }
          $version = $tag.Substring(1)
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Run release checks
        shell: pwsh
        run: ./scripts/check.ps1 -Scope release

      - name: Build release artifacts
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: ./scripts/build-release.ps1 -Version ${{ steps.version.outputs.version }} -AllowDirty

      - name: Validate release notes
        shell: pwsh
        run: ./scripts/assert-release-notes.ps1 -Path release/v${{ steps.version.outputs.version }}/release-notes-v${{ steps.version.outputs.version }}.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          fail_on_unmatched_files: true
          body_path: release/v${{ steps.version.outputs.version }}/release-notes-v${{ steps.version.outputs.version }}.md
          files: |
            release/v${{ steps.version.outputs.version }}/acliv-v${{ steps.version.outputs.version }}.exe
            release/v${{ steps.version.outputs.version }}/acliv-v${{ steps.version.outputs.version }}-x64-setup.exe
            release/v${{ steps.version.outputs.version }}/acliv-v${{ steps.version.outputs.version }}-x64-en-us.msi
            release/v${{ steps.version.outputs.version }}/acliv-v${{ steps.version.outputs.version }}-x64-en-us.msi.sig

  macos-release:
    name: macos-release (${{ matrix.arch }})
    needs: windows-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Derive release version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" != v* ]]; then
            echo "Expected tag ref like v1.2.3, got: $tag" >&2
            exit 1
          fi
          version="${tag#v}"
          {
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Sync release version
        shell: pwsh
        run: ./scripts/sync-version.ps1 -Version ${{ steps.version.outputs.version }}

      - name: Run release checks
        shell: pwsh
        run: ./scripts/check.ps1 -Scope release

      - name: Build macOS bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is required for updater artifacts." >&2
            exit 1
          fi
          npm run tauri build -- --bundles app,dmg

      - name: Collect macOS artifacts
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          release_dir="release/v${version}"
          mkdir -p "$release_dir"

          dmg_path="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f | head -n 1)"
          tar_path="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.tar.gz' -type f | head -n 1)"

          if [[ -z "$dmg_path" ]]; then
            echo "Missing macOS .dmg installer" >&2
            exit 1
          fi
          if [[ -z "$tar_path" || ! -f "$tar_path.sig" ]]; then
            echo "Missing macOS updater .tar.gz or .sig" >&2
            exit 1
          fi

          cp "$dmg_path" "$release_dir/acliv-v${version}-macos-${{ matrix.arch }}.dmg"
          cp "$tar_path" "$release_dir/acliv-v${version}-macos-${{ matrix.arch }}.tar.gz"
          cp "$tar_path.sig" "$release_dir/acliv-v${version}-macos-${{ matrix.arch }}.tar.gz.sig"

      - name: Publish macOS assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            release/v${{ steps.version.outputs.version }}/acliv-v${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.dmg
            release/v${{ steps.version.outputs.version }}/acliv-v${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.tar.gz
            release/v${{ steps.version.outputs.version }}/acliv-v${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.tar.gz.sig

  latest-json:
    runs-on: ubuntu-latest
    needs:
      - windows-release
      - macos-release
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p assets
          gh release download "${GITHUB_REF_NAME}" --dir assets --repo "${GITHUB_REPOSITORY}"
          ls -la assets

      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          ls \
            "assets/acliv-v${VERSION}-x64-en-us.msi" \
            "assets/acliv-v${VERSION}-x64-en-us.msi.sig" \
            "assets/acliv-v${VERSION}-macos-x64.tar.gz" \
            "assets/acliv-v${VERSION}-macos-x64.tar.gz.sig" \
            "assets/acliv-v${VERSION}-macos-arm64.tar.gz" \
            "assets/acliv-v${VERSION}-macos-arm64.tar.gz.sig" >/dev/null
          WIN_SIG="$(tr -d '\r\n' < "assets/acliv-v${VERSION}-x64-en-us.msi.sig")"
          MAC_X64_SIG="$(tr -d '\r\n' < "assets/acliv-v${VERSION}-macos-x64.tar.gz.sig")"
          MAC_ARM64_SIG="$(tr -d '\r\n' < "assets/acliv-v${VERSION}-macos-arm64.tar.gz.sig")"
          cat > latest.json <<JSON
          {
            "version": "${VERSION}",
            "notes": "Release ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE_URL}/acliv-v${VERSION}-x64-en-us.msi"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "${BASE_URL}/acliv-v${VERSION}-macos-x64.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${MAC_ARM64_SIG}",
                "url": "${BASE_URL}/acliv-v${VERSION}-macos-arm64.tar.gz"
              }
            }
          }
          JSON
          jq empty latest.json
          cat latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" latest.json --clobber --repo "${GITHUB_REPOSITORY}"
