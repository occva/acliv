name: Docker Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release version to backfill, for example 1.0.8 or v1.0.8"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout requested tag
        if: ${{ inputs.version != '' }}
        shell: bash
        run: |
          clean_version="${{ inputs.version }}"
          clean_version="${clean_version#v}"
          git fetch --depth=1 --force origin "refs/tags/v${clean_version}:refs/tags/v${clean_version}"
          git checkout "v${clean_version}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: prep
        shell: bash
        run: |
          image="ghcr.io/occva/acliv"
          manual_version="${{ inputs.version }}"
          if [[ -n "${manual_version}" ]]; then
            clean_version="${manual_version#v}"
            version="v${clean_version}"
            tags="${image}:${version},${image}:${clean_version},${image}:latest"
            image_tag="${clean_version}"
            build_ref="${GITHUB_SHA}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF#refs/tags/}"
            clean_version="${version#v}"
            tags="${image}:${version},${image}:${clean_version},${image}:latest"
            image_tag="${clean_version}"
            build_ref="${GITHUB_SHA}"
          else
            short_sha="${GITHUB_SHA::7}"
            tags="${image}:latest,${image}:sha-${short_sha}"
            image_tag="sha-${short_sha}"
            build_ref="${GITHUB_SHA}"
          fi
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "build_ref=${build_ref}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          build-args: |
            ACLIV_IMAGE_TAG=${{ steps.prep.outputs.image_tag }}
            ACLIV_BUILD_REF=${{ steps.prep.outputs.build_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
