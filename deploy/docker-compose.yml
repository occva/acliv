services:
  aichv-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: aichv-web:latest
    container_name: aichv-web
    restart: unless-stopped
    ports:
      - "${BIND_HOST:-0.0.0.0}:${AICHV_PORT:-17860}:17860"
    environment:
      - AICHV_HOST=0.0.0.0
      - AICHV_PORT=17860
      - AICHV_TOKEN=${AICHV_TOKEN:?AICHV_TOKEN is required}
      - AICHV_HOME=${CONTAINER_HOME:-/host-home}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - app_data:/app/data
      - ${HOST_HOME:?HOST_HOME is required}:${CONTAINER_HOME:-/host-home}:rw
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:17860/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  app_data:
    driver: local
